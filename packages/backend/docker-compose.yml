version: "3.8"

services:
  backend:
    build:
      context: ../..
      dockerfile: packages/backend/Dockerfile
    container_name: saas-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://saas_user:saas_password@postgres:5432/saas_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge
